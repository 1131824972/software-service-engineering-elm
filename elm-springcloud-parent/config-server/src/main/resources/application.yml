server:
  port: 15000

spring:
  application:
    name: config-service
  profiles:
    active: ${CONFIG_SERVER_PROFILE:git}
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
  cloud:
    bus:
      enabled: true
      destination: springCloudBus
    stream:
      bindings:
        springCloudBusInput:
          destination: springCloudBus
          group: ${spring.application.name}
        springCloudBusOutput:
          destination: springCloudBus

eureka:
  instance:
    prefer-ip-address: true
    instance-id: ${spring.cloud.client.ip-address}:${server.port}
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info,refresh,busrefresh

---
spring:
  config:
    activate:
      on-profile: native
  cloud:
    config:
      server:
        native:
          search-locations: file:./config-repo

---
spring:
  config:
    activate:
      on-profile: git
  cloud:
    config:
      server:
        git:
          uri: ${CONFIG_GIT_URI:https://github.com/1131824972/software-service-engineering-elm.git}
          default-label: ${CONFIG_GIT_LABEL:main}
          search-paths: ${CONFIG_GIT_SEARCH_PATHS:config-repo}
          username: ${CONFIG_GIT_USERNAME:}
          password: ${CONFIG_GIT_PASSWORD:}

---
spring:
  config:
    activate:
      on-profile: config15001
server:
  port: 15001

---
spring:
  config:
    activate:
      on-profile: config15002
server:
  port: 15002
